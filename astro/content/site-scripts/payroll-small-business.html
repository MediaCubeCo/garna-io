<script>
        (function () {
            var items = document.querySelectorAll('.reveal');

            if (!('IntersectionObserver' in window)) {
                items.forEach(function (item) {
                    item.classList.add('is-visible');
                });
                return;
            }

            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.16,
                rootMargin: '0px 0px -8% 0px',
            });

            items.forEach(function (item) {
                observer.observe(item);
            });
        })();
    </script>

<script>
        (function () {
            var faqItems = document.querySelectorAll('.faq-item');
            var reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)');

            function getPanel(item) {
                return item.querySelector('.faq-panel');
            }

            function finishAnimation(item, panel, shouldStayOpen) {
                panel.style.height = shouldStayOpen ? 'auto' : '0px';
                delete item.dataset.faqAnimating;
            }

            function openItem(item, trigger) {
                var panel = getPanel(item);
                if (!panel) return;

                item.classList.add('is-active');
                trigger.setAttribute('aria-expanded', 'true');

                if (reducedMotion && reducedMotion.matches) {
                    panel.style.height = 'auto';
                    panel.style.opacity = '1';
                    panel.style.transform = 'translateY(0)';
                    return;
                }

                item.dataset.faqAnimating = 'true';
                panel.style.height = '0px';
                panel.style.opacity = '0';
                panel.style.transform = 'translateY(-10px)';

                var targetHeight = panel.scrollHeight;

                requestAnimationFrame(function () {
                    panel.style.height = targetHeight + 'px';
                    panel.style.opacity = '1';
                    panel.style.transform = 'translateY(0)';
                });

                var timeoutId = window.setTimeout(function () {
                    finishAnimation(item, panel, true);
                    panel.removeEventListener('transitionend', handleEnd);
                }, 620);

                function handleEnd(event) {
                    if (event.propertyName !== 'height') return;
                    window.clearTimeout(timeoutId);
                    finishAnimation(item, panel, true);
                    panel.removeEventListener('transitionend', handleEnd);
                }

                panel.addEventListener('transitionend', handleEnd);
            }

            function closeItem(item, trigger) {
                var panel = getPanel(item);
                if (!panel) return;

                item.classList.remove('is-active');
                trigger.setAttribute('aria-expanded', 'false');

                if (reducedMotion && reducedMotion.matches) {
                    panel.style.height = '0px';
                    panel.style.opacity = '0';
                    panel.style.transform = 'translateY(-10px)';
                    return;
                }

                item.dataset.faqAnimating = 'true';
                panel.style.height = panel.scrollHeight + 'px';
                panel.style.opacity = '1';
                panel.style.transform = 'translateY(0)';

                requestAnimationFrame(function () {
                    panel.style.height = '0px';
                    panel.style.opacity = '0';
                    panel.style.transform = 'translateY(-10px)';
                });

                var timeoutId = window.setTimeout(function () {
                    finishAnimation(item, panel, false);
                    panel.removeEventListener('transitionend', handleEnd);
                }, 620);

                function handleEnd(event) {
                    if (event.propertyName !== 'height') return;
                    window.clearTimeout(timeoutId);
                    finishAnimation(item, panel, false);
                    panel.removeEventListener('transitionend', handleEnd);
                }

                panel.addEventListener('transitionend', handleEnd);
            }

            faqItems.forEach(function (item) {
                var trigger = item.querySelector('.faq-trigger');
                var panel = getPanel(item);
                if (!trigger || !panel) return;

                item.classList.remove('is-active');
                trigger.setAttribute('aria-expanded', 'false');
                panel.style.height = '0px';
                panel.style.opacity = '0';
                panel.style.transform = 'translateY(-10px)';
            });

            document.addEventListener('click', function (event) {
                var trigger = event.target.closest ? event.target.closest('.faq-trigger') : null;
                if (!trigger) return;

                var item = trigger.closest ? trigger.closest('.faq-item') : null;
                if (!item || item.dataset.faqAnimating === 'true') return;

                if (item.classList.contains('is-active')) {
                    closeItem(item, trigger);
                } else {
                    openItem(item, trigger);
                }
            });
        })();
    </script>

<script>
        (function () {
            function getLocale() {
                var htmlLang = document.documentElement.getAttribute('lang');
                if (htmlLang) {
                    var lang = htmlLang.split('-')[0].toLowerCase();
                    if (['en', 'es', 'pt', 'ru'].indexOf(lang) !== -1) return lang;
                }
                return 'en';
            }

            function applyLocalizedLinks() {
                var locale = getLocale();
                document.querySelectorAll('[data-garna-signup]').forEach(function (link) {
                    link.href = 'https://app.garna.io/' + locale + '/auth/sign-up';
                });
                document.querySelectorAll('[data-garna-signin]').forEach(function (link) {
                    link.href = 'https://app.garna.io/' + locale + '/auth/sign-in';
                });
                document.querySelectorAll('[data-garna-home]').forEach(function (link) {
                    link.href = '/' + locale;
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', applyLocalizedLinks);
            } else {
                applyLocalizedLinks();
            }
        })();
    </script>
