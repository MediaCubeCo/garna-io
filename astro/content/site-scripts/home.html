<script>
        lucide.createIcons({
            attrs: {
                'stroke-width': 1.5
            }
        });

        function initCounterAnimation() {
            const elements = document.querySelectorAll('.counter-anim');
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function formatValue(value, decimals) {
                return value.toLocaleString('en-US', {
                    minimumFractionDigits: decimals,
                    maximumFractionDigits: decimals
                });
            }

            elements.forEach(el => {
                const target = parseFloat(el.getAttribute('data-target'));
                const prefix = el.getAttribute('data-prefix') || '';
                const suffix = el.getAttribute('data-suffix') || '';
                const decimals = parseInt(el.getAttribute('data-decimals') || 0);
                const finalValue = prefix + formatValue(target, decimals) + suffix;

                if (prefersReducedMotion) {
                    el.innerText = finalValue;
                    return;
                }

                function animate() {
                    if (el.dataset.counterAnimated === 'true') return;
                    el.dataset.counterAnimated = 'true';
                    const start = 0;
                    const duration = 2000;
                    const startTime = performance.now();

                    function update(currentTime) {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const ease = 1 - Math.pow(1 - progress, 4);
                        const current = start + (target - start) * ease;

                        el.innerText = prefix + formatValue(current, decimals) + suffix;

                        if (progress < 1) {
                            requestAnimationFrame(update);
                        } else {
                            el.innerText = finalValue;
                        }
                    }

                    requestAnimationFrame(update);
                }

                if ('IntersectionObserver' in window) {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                animate();
                                observer.disconnect();
                            }
                        });
                    }, { threshold: 0.1 });

                    observer.observe(el);
                } else {
                    animate();
                }
            });
        }

        initCounterAnimation();

        function switchStep(index) {
            const triggers = document.querySelectorAll('.step-trigger');
            triggers.forEach((trigger, i) => {
                const circle = trigger.querySelector('.step-circle');
                if (i === index) {
                    trigger.classList.remove('opacity-50', 'hover:opacity-80');
                    trigger.classList.add('opacity-100');
                    circle.classList.remove('text-gray-500', 'border-white/10');
                    circle.classList.add('border-[#5EA500]', 'text-[#5EA500]', 'shadow-[0_0_15px_rgba(94,165,0,0.3)]');
                } else {
                    trigger.classList.add('opacity-50', 'hover:opacity-80');
                    trigger.classList.remove('opacity-100');
                    circle.classList.add('text-gray-500', 'border-white/10');
                    circle.classList.remove('border-[#5EA500]', 'text-[#5EA500]', 'shadow-[0_0_15px_rgba(94,165,0,0.3)]');
                }
            });

            const contents = document.querySelectorAll('.step-content');
            contents.forEach((content, i) => {
                if (i === index) {
                    content.classList.remove('opacity-0', 'translate-y-8', 'scale-95', '-z-10');
                    content.classList.add('opacity-100', 'translate-y-0', 'scale-100', 'z-10');
                } else {
                    content.classList.add('opacity-0', 'translate-y-8', 'scale-95', '-z-10', 'pointer-events-none');
                    content.classList.remove('opacity-100', 'translate-y-0', 'scale-100', 'z-10');
                }
            });

            setTimeout(() => {
                lucide.createIcons();
            }, 100);
        }
    </script>
