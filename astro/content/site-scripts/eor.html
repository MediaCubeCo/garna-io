<script>
        (function () {
            const shell = document.querySelector('[data-eor-card-scroll-shell]');
            const scroller = shell ? shell.querySelector('.eor-card-scroll') : null;
            const prevButton = shell ? shell.querySelector('[data-eor-card-scroll-prev]') : null;
            const nextButton = shell ? shell.querySelector('[data-eor-card-scroll-next]') : null;
            if (!shell || !scroller || !prevButton || !nextButton) return;

            function updateScrollState() {
                const maxScroll = Math.max(scroller.scrollWidth - scroller.clientWidth, 0);
                const atStart = scroller.scrollLeft <= 4;
                const atEnd = scroller.scrollLeft >= maxScroll - 4;
                shell.dataset.eorScrollStart = atStart ? 'true' : 'false';
                shell.dataset.eorScrollEnd = atEnd ? 'true' : 'false';
            }

            function scrollCards(direction) {
                scroller.scrollBy({
                    left: direction * Math.min(scroller.clientWidth * 0.82, 360),
                    behavior: 'smooth'
                });
            }

            prevButton.addEventListener('click', () => scrollCards(-1));
            nextButton.addEventListener('click', () => scrollCards(1));
            scroller.addEventListener('scroll', updateScrollState, { passive: true });
            window.addEventListener('resize', updateScrollState);
            window.requestAnimationFrame(updateScrollState);
        })();
    </script>
