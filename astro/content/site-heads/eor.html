    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #a1a1aa;
        }

        h1,
        h2,
        h3,
        h4,
        .font-heading,
        .font-manrope {
            font-family: 'Manrope', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }

        .glass-high {
            background: rgba(5, 5, 5, 0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .surface {
            background: linear-gradient(180deg, rgba(18, 18, 18, 0.96), rgba(8, 8, 8, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .surface-soft {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .green-glow {
            box-shadow: 0 0 36px -16px rgba(94, 165, 0, 0.9);
        }

        .grid-backdrop {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.045) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
            background-size: 34px 34px;
        }

        .button-primary {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            isolation: isolate;
            overflow: hidden;
            min-height: 3rem;
            padding: 0.8rem 1.6rem;
            border-radius: 0.75rem;
            color: #fff;
            background: #5EA500;
            box-shadow:
                0 0 26px -10px rgba(94, 165, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.28s ease, filter 0.28s ease;
        }

        .button-primary::before {
            content: "";
            position: absolute;
            inset: -120% -45%;
            z-index: -1;
            background: linear-gradient(115deg, transparent 34%, rgba(255, 255, 255, 0.34) 48%, transparent 62%);
            transform: translateX(-70%) rotate(8deg);
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .button-primary::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.28), transparent 34%);
            opacity: 0.6;
            transition: opacity 0.28s ease;
        }

        .button-primary iconify-icon {
            transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .button-primary:hover {
            transform: translateY(-3px);
            background: #5EA500;
            filter: saturate(1.08);
            box-shadow:
                0 18px 34px -22px rgba(94, 165, 0, 1),
                0 0 34px -8px rgba(94, 165, 0, 0.92),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .button-primary:hover::before {
            transform: translateX(70%) rotate(8deg);
        }

        .button-primary:hover::after {
            opacity: 0.85;
        }

        .button-primary:hover iconify-icon {
            transform: translate(3px, -3px);
        }

        .button-primary:active {
            transform: translateY(-1px) scale(0.99);
        }

        details > summary {
            list-style: none;
        }

        details > summary::-webkit-details-marker {
            display: none;
        }

        .eor-faq-item {
            overflow: hidden;
            background: #0A0A0A;
            transition: background 0.28s ease;
        }

        .eor-faq-item[open] {
            background: #0E0E0E;
        }

        .eor-faq-item summary:focus-visible {
            outline: 2px solid rgba(94, 165, 0, 0.7);
            outline-offset: 6px;
            border-radius: 0.875rem;
        }

        .eor-faq-panel {
            height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-8px);
            transition: height 0.46s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.26s ease, transform 0.34s ease;
        }

        .eor-faq-item[data-state="open"] .eor-faq-panel {
            opacity: 1;
            transform: translateY(0);
        }

        .eor-faq-icon {
            transition: transform 0.34s ease, color 0.24s ease;
        }

        .eor-faq-item[data-state="open"] .eor-faq-icon {
            transform: rotate(180deg);
        }

        @media (prefers-reduced-motion: reduce) {
            .eor-faq-item,
            .eor-faq-panel,
            .eor-faq-icon {
                transition: none;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 7s ease-in-out infinite;
        }

        .eor-card-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
            scroll-behavior: smooth;
            scroll-snap-type: x proximity;
        }

        .eor-card-scroll::-webkit-scrollbar {
            display: none;
        }

        .eor-card-scroll > article {
            scroll-snap-align: start;
        }

        .eor-card-edge {
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 20;
            display: none;
            width: 5.5rem;
            align-items: center;
            pointer-events: none;
        }

        .eor-card-edge::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .eor-card-edge--left {
            left: 0;
            justify-content: flex-start;
            padding-left: 0.75rem;
        }

        .eor-card-edge--left::before {
            background: linear-gradient(to right, #050505 0%, rgba(5, 5, 5, 0.9) 34%, rgba(5, 5, 5, 0));
        }

        .eor-card-edge--right {
            right: 0;
            justify-content: flex-end;
            padding-right: 0.75rem;
        }

        .eor-card-edge--right::before {
            background: linear-gradient(to left, #050505 0%, rgba(5, 5, 5, 0.9) 34%, rgba(5, 5, 5, 0));
        }

        .eor-card-edge-button {
            position: relative;
            display: flex;
            height: 2.75rem;
            width: 2.75rem;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(17, 17, 17, 0.96);
            color: #5EA500;
            pointer-events: auto;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .eor-card-edge-button:hover {
            border-color: rgba(94, 165, 0, 0.4);
            background: #171717;
        }

        .eor-card-edge-button:active {
            transform: scale(0.95);
        }

        @media (max-width: 767px) {
            [data-eor-card-scroll-shell][data-eor-scroll-start="false"] {
                margin-left: -1.5rem;
            }

            [data-eor-card-scroll-shell][data-eor-scroll-start="false"] .eor-card-edge--left,
            [data-eor-card-scroll-shell][data-eor-scroll-end="false"] .eor-card-edge--right {
                display: flex;
            }
        }

        .why-garna input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .why-garna-tab {
            display: block;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.7rem;
            color: #71717a;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.18s ease, border-color 0.18s ease;
            white-space: normal;
        }

        @media (min-width: 768px) {
            .why-garna-tab {
                padding-bottom: 1rem;
                font-size: 1rem;
                white-space: nowrap;
            }
        }

        .why-garna-tab:hover {
            color: #ffffff;
        }

        .why-garna .why-garna-panel {
            display: none;
        }

        #why-garna-sourcing:checked ~ .why-garna-tabs label[for="why-garna-sourcing"],
        #why-garna-onboarding:checked ~ .why-garna-tabs label[for="why-garna-onboarding"],
        #why-garna-documents:checked ~ .why-garna-tabs label[for="why-garna-documents"],
        #why-garna-payroll:checked ~ .why-garna-tabs label[for="why-garna-payroll"],
        #why-garna-reporting:checked ~ .why-garna-tabs label[for="why-garna-reporting"],
        #why-garna-termination:checked ~ .why-garna-tabs label[for="why-garna-termination"] {
            border-color: #5EA500;
            color: #ffffff;
        }

        #why-garna-sourcing:checked ~ .why-garna-panels [data-eor-why-panel="sourcing"],
        #why-garna-onboarding:checked ~ .why-garna-panels [data-eor-why-panel="onboarding"],
        #why-garna-documents:checked ~ .why-garna-panels [data-eor-why-panel="documents"],
        #why-garna-payroll:checked ~ .why-garna-panels [data-eor-why-panel="payroll"],
        #why-garna-reporting:checked ~ .why-garna-panels [data-eor-why-panel="reporting"],
        #why-garna-termination:checked ~ .why-garna-panels [data-eor-why-panel="termination"] {
            display: grid;
        }
    </style>
</head>
