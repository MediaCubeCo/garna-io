<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garna - AI Recruitment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_180.png" />
    <link rel="icon" type="image/x-icon" href="/favicon_32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png" />
    <link rel="stylesheet" href="/rainbow-bg.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #a1a1aa;
        }

        h1,
        h2,
        h3,
        h4,
        .font-heading {
            font-family: 'Manrope', sans-serif;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }

        /* Glassmorphism utilities */
        .glass-nav {
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Grid Pattern Background */
        .bg-grid {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Hide details marker */
        details>summary {
            list-style: none;
        }

        details>summary::-webkit-details-marker {
            display: none;
        }

        /* Animations */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
    <link id="all-fonts-link-font-manrope" rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap">
    <style id="all-fonts-style-font-manrope">
        .font-manrope {
            font-family: 'Manrope', sans-serif !important;
        }
    </style>
</head>

<body class="antialiased overflow-x-hidden selection:bg-indigo-500/30 selection:text-indigo-200 font-manrope relative">
