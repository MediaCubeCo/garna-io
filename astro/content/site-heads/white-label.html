<style>
body { font-family: 'Inter', sans-serif; background-color: #050505; color: #a1a1aa; }
h1, h2, h3, h4, .font-heading { font-family: 'Manrope', sans-serif; }
/* Smooth scrolling */
html { scroll-behavior: smooth; }
/* Custom scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #050505; }
::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #404040; }
/* Glassmorphism utilities */
.glass-nav, .glass-high {
background: rgba(5, 5, 5, 0.7);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}
.glass-card {
background: rgba(10, 10, 10, 0.92);
backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.08);
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}
/* Grid Pattern Background */
.bg-grid {
background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size: 40px 40px;
}
/* Hide details marker */
details > summary { list-style: none; }
details > summary::-webkit-details-marker { display: none; }
/* Animations */
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}
.animate-float { animation: float 6s ease-in-out infinite; }
@property --gradient-angle {
syntax: "<angle>";
initial-value: 0deg;
inherits: false;
}
@property --gradient-angle-offset {
syntax: "<angle>";
initial-value: 0deg;
inherits: false;
}
@property --gradient-percent {
syntax: "<percentage>";
initial-value: 20%;
inherits: false;
}
@property --gradient-shine {
syntax: "<color>";
initial-value: #ffffff;
inherits: false;
}
@keyframes border-spin {
to { --gradient-angle: 360deg; }
}
@keyframes shimmer {
to { transform: translate(-50%, -50%) rotate(360deg); }
}
@keyframes breathe {
0%, 100% { transform: translate(-50%, -50%) scale(1); }
50% { transform: translate(-50%, -50%) scale(1.1); }
}
.garna-demo-cta {
position: relative;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 0.5rem;
padding: 12px 32px;
--gradient-angle: 0deg;
--gradient-angle-offset: 0deg;
--gradient-percent: 20%;
--gradient-shine: #ffffff;
--bg-color: #5EA500;
background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box, conic-gradient(from calc(var(--gradient-angle) - var(--gradient-angle-offset)), transparent 0%, #5EA500 5%, var(--gradient-shine) 15%, #5EA500 30%, transparent 40%, transparent 100%) border-box;
border: 2px solid transparent;
box-shadow: rgba(255, 255, 255, 0.1) 0 0 0 1px inset;
animation: border-spin 2.5s linear infinite;
overflow: hidden;
isolation: isolate;
}
.garna-demo-cta::before {
content: '';
pointer-events: none;
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
z-index: 0;
width: 100%;
height: 100%;
background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 1px, transparent 1px) padding-box;
background-size: 8px 8px;
mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
opacity: 0.3;
}
.garna-demo-cta::after {
content: '';
pointer-events: none;
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
z-index: 1;
width: 100%;
aspect-ratio: 1;
background: linear-gradient(-50deg, transparent, rgba(94, 165, 0, 0.4), transparent);
mask-image: radial-gradient(circle at bottom, transparent 40%, black);
opacity: 0.5;
animation: shimmer 4s linear infinite;
}
.garna-demo-cta .inner {
position: relative;
z-index: 2;
}
.garna-demo-cta .inner::before {
content: '';
pointer-events: none;
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
z-index: -1;
width: 120%;
height: 200%;
box-shadow: inset 0 0 2rem 4px rgba(94, 165, 0, 0.3);
opacity: 0.5;
border-radius: inherit;
animation: breathe 4s linear infinite;
}
.garna-demo-cta:hover .icon path {
animation: dash 0.8s linear forwards;
}
@keyframes dash {
0% { stroke-dasharray: 0, 20; stroke-dashoffset: 0; }
50% { stroke-dasharray: 10, 10; stroke-dashoffset: -5; }
100% { stroke-dasharray: 20, 0; stroke-dashoffset: -10; }
}
